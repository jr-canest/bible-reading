            h("p",{style:{fontFamily:"'Cormorant Garamond',serif",fontSize:16,lineHeight:1.6,color:"#5a4a3c"}},v.text)
          );
        })
      )
    ),

    mView==="add"&&h("div",{style:{background:"#fff",borderRadius:14,padding:24,boxShadow:"0 1px 4px rgba(60,36,21,0.06)",border:"1px solid #e8e0d4"}},
      h("h2",{style:{fontFamily:"'Newsreader',serif",fontSize:22,fontWeight:600,color:"#3C2415",marginBottom:4}},"Add a Verse"),
      h("p",{style:{fontSize:13,color:"#a09585",lineHeight:1.5,marginBottom:8,fontFamily:"'Newsreader',serif"}},"Type an ESV reference, look it up, then confirm to add. Ranges like \u201CRomans 8:28-30\u201D work as single cards with verse numbers."),
      !mPreview
        ?h("div",null,
          h("label",{style:{fontSize:12,fontWeight:600,color:"#a09585",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6,display:"block",marginTop:16}},"Reference"),
          h("div",{style:{display:"flex",gap:8}},
            h("input",{style:{flex:1,border:"1px solid #d4c5a9",borderRadius:8,padding:"10px 14px",fontSize:15,fontFamily:"system-ui",background:"#FAF7F2",color:"#3C2415"},value:mAddRef,onChange:function(e){setMAddRef(e.target.value);setMFetchErr(null)},placeholder:"e.g. John 3:16 or Psalm 25:8-10",onKeyDown:function(e){if(e.key==="Enter")mHandleFetch()},disabled:mFetching,autoFocus:true}),
            h("button",{style:{background:"#8B4513",color:"#FAF7F2",border:"none",borderRadius:8,padding:"10px 18px",fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"'Newsreader',serif",whiteSpace:"nowrap",opacity:!mAddRef.trim()||mFetching?0.5:1},onClick:mHandleFetch,disabled:!mAddRef.trim()||mFetching},mFetching?"Looking up\u2026":"Look up")
          ),
          mFetching&&h("div",{style:{marginTop:12,height:3,background:"#ece4d8",borderRadius:3,overflow:"hidden"}},h("div",{style:{height:"100%",background:"#8B4513",borderRadius:3,animation:"memFetchPulse 2s ease-in-out infinite"}})),
          mFetchErr&&h("div",{style:{marginTop:16,background:"#FFF3F0",border:"1px solid #FFCDD2",borderRadius:8,padding:"12px 16px"}},
            h("p",{style:{fontSize:13,fontWeight:600,color:"#c0392b",marginBottom:4}},"Something went wrong"),
            h("p",{style:{fontSize:12,color:"#a09585",lineHeight:1.4,wordBreak:"break-word"}},mFetchErr)
          )
        )
        :h("div",{style:{marginTop:16}},
          h("div",{style:{background:"#FAF7F2",border:"1px solid #e8e0d4",borderRadius:10,padding:"20px 22px"}},
            h("h3",{style:{fontFamily:"'Newsreader',serif",fontSize:20,fontWeight:600,color:"#3C2415"}},mPreview.reference),
            h("div",{style:{height:1,background:"#e8e0d4",margin:"14px 0"}}),
            h("p",{style:{fontFamily:"'Cormorant Garamond',serif",fontSize:17,lineHeight:1.6,color:"#3C2415"}},mPreview.text),
            h("p",{style:{fontSize:11,color:"#a09585",marginTop:12,fontWeight:500,letterSpacing:"0.05em"}},"ESV")
          ),
          h("div",{style:{display:"flex",gap:10,marginTop:16}},
            h("button",{style:{background:"#8B4513",color:"#FAF7F2",border:"none",borderRadius:10,padding:"10px 20px",fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"'Newsreader',serif"},onClick:mConfirmAdd},"Add This Verse"),
            h("button",{style:{background:"none",border:"1px solid #d4c5a9",color:"#a09585",borderRadius:10,padding:"10px 20px",fontSize:14,fontWeight:500,cursor:"pointer",fontFamily:"'Newsreader',serif"},onClick:function(){setMPreview(null)}},"Try Another")
          )
        )
    ),
    toastEl
  );
}

// === PAIR CARD ===
function PairCard({pairIdx,label,isCurrent,state,toggle}){
  if(pairIdx<0||pairIdx>=PAIRS)return null;
  const pair=gp(pairIdx),checks=state.checks[String(pairIdx)]||[],complete=checks.length===2;
  return h("div",{style:{background:isCurrent?"#fff":"#faf8f4",borderRadius:16,padding:"20px 20px 16px",boxShadow:isCurrent?"0 2px 20px rgba(60,36,21,0.1)":"0 1px 4px rgba(60,36,21,0.06)",border:isCurrent?"2px solid #8B4513":"1px solid #e8e0d4",opacity:complete&&!isCurrent?0.6:1,transition:"all 0.3s ease"}},
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}},
      h("div",null,
        label&&h("div",{style:{fontSize:11,fontFamily:"'Newsreader',serif",color:"#8B4513",letterSpacing:"0.1em",textTransform:"uppercase",fontWeight:600}},label),
        h("div",{style:{fontSize:13,color:"#6b5744",fontFamily:"'Newsreader',serif"}},"Pair "+(pairIdx+1)+" of "+PAIRS)
      ),
      h("div",{style:{width:36,height:36,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,fontFamily:"'Newsreader',serif",background:complete?"#8B4513":checks.length>0?"#d4a574":"#ece4d8",color:checks.length>0?"#fff":"#9b8b7a",transition:"all 0.3s ease"}},complete?"✓":checks.length+"/2")
    ),
    h("div",{style:{display:"flex",flexDirection:"column",gap:6}},
      pair.map((r,i)=>{
        const done=checks.includes(i);
        return h("button",{key:i,onClick:()=>toggle(pairIdx,i),style:{display:"flex",alignItems:"center",gap:12,padding:"12px",borderRadius:10,border:"none",background:done?"#f5efe7":"transparent",cursor:"pointer",textAlign:"left",width:"100%",transition:"all 0.2s ease"}},
          h("div",{style:{width:24,height:24,borderRadius:7,flexShrink:0,border:done?"2px solid #8B4513":"2px solid #ccc2b5",background:done?"#8B4513":"transparent",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s ease"}},done&&h(Check)),
          h("div",{style:{flex:1,minWidth:0}},
            h("div",{style:{fontSize:18,fontFamily:"'Newsreader',serif",fontWeight:600,color:done?"#a08872":"#3C2415",textDecoration:done?"line-through":"none",transition:"all 0.2s ease"}},r),
            h("div",{style:{fontSize:11,color:"#a09585",fontFamily:"system-ui",marginTop:1}},cat(r))
          )
        )
      })
    )
  )
}

// === MAIN APP ===
function App(){
  const[state,setState]=React.useState(load);
  const[view,setView]=React.useState("read");
  const[browseIdx,setBrowseIdx]=React.useState(null);
  const _saving=React.useRef(false);
  React.useEffect(function(){_syncCb=function(remote){if(!_saving.current){setState(function(prev){return migrateInitialProgress({...ds(),...remote})})}};startSync();return function(){_syncCb=null}},[]);
  const pos=state.position;
  const totalChecked=Object.values(state.checks).reduce((sum,arr)=>sum+arr.length,0);
  const pct=Math.round(totalChecked/TOTAL*100);

  function toggle(pi,si){
    _saving.current=true;
    setState(prev=>{
      const k=String(pi),cur=prev.checks[k]||[];
      const next=cur.includes(si)?cur.filter(x=>x!==si):[...cur,si];
      const today=td(),delta=next.length-cur.length;
      const nl={...prev.log};nl[today]=(nl[today]||0)+delta;if(nl[today]<=0)delete nl[today];
      const nc={...prev.checks,[k]:next};if(next.length===0)delete nc[k];
      let np=prev.position;while(np<PAIRS&&(nc[String(np)]||[]).length===2)np++;
      const s={...prev,checks:nc,log:nl,position:np};save(s);setTimeout(function(){_saving.current=false},1000);return s;
    });
  }

  // Stats
  const chartData=(()=>{const data=[],d=new Date();for(let i=29;i>=0;i--){const dt=new Date(d);dt.setDate(dt.getDate()-i);const s=dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0");data.push({label:(dt.getMonth()+1)+"/"+dt.getDate(),readings:state.log[s]||0})}return data})();

  const stats=(()=>{let tr=0,da=0,cs=0,ls=0,ts=0;const sorted=Object.keys(state.log).filter(k=>state.log[k]>0).sort();for(const s of sorted){tr+=state.log[s];da++}if(sorted.length>0){ts=1;ls=1;for(let i=1;i<sorted.length;i++){const diff=Math.round((new Date(sorted[i]+"T12:00:00")-new Date(sorted[i-1]+"T12:00:00"))/86400000);if(diff===1){ts++;if(ts>ls)ls=ts}else ts=1}}const d=new Date();for(let i=0;i<400;i++){const dt=new Date(d);dt.setDate(dt.getDate()-i);const s=dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0");if((state.log[s]||0)>0)cs++;else break}return{totalRead:tr,daysActive:da,currentStreak:cs,longestStreak:ls}})();

  // Browse sections
  function BrowseView(){
    const CH=73,chunks=[];
    for(let i=0;i<PAIRS;i+=CH){const end=Math.min(i+CH,PAIRS);chunks.push({start:i,end,label:gp(i)[0]+" – "+gp(end-1)[1]})}
    return h("div",{style:{display:"flex",flexDirection:"column",gap:16}},
      h("button",{onClick:()=>{setBrowseIdx(null);setView("read")},style:{padding:10,borderRadius:10,border:"1px solid #d4a574",background:"#f5efe7",cursor:"pointer",color:"#8B4513",fontSize:13,fontFamily:"'Newsreader',serif",fontWeight:600}},"← Back to current readings"),
      chunks.map((chunk,ci)=>{
        const hasPos=pos>=chunk.start&&pos<chunk.end;
        return h("div",{key:ci},
          h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}},
            h("div",{style:{fontSize:12,fontFamily:"'Newsreader',serif",fontWeight:700,color:"#8B4513",letterSpacing:"0.03em",display:"flex",alignItems:"center",gap:8}},
              chunk.label,hasPos&&h("span",{style:{fontSize:9,background:"#8B4513",color:"#fff",padding:"1px 6px",borderRadius:4,fontWeight:700,fontFamily:"system-ui",letterSpacing:0}},"HERE")
            )
          ),
          h("div",{style:{display:"flex",flexDirection:"column",gap:1}},
            Array.from({length:chunk.end-chunk.start},(_,di)=>{
              const idx=chunk.start+di,pair=gp(idx),checks=state.checks[String(idx)]||[];
              const complete=checks.length===2,partial=checks.length===1,isCurrent=idx===pos,isExp=browseIdx===idx;
              return h("div",{key:idx},
                h("button",{onClick:()=>setBrowseIdx(isExp?null:idx),style:{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"7px 8px",borderRadius:6,border:"none",cursor:"pointer",textAlign:"left",background:isCurrent?"#f5efe7":isExp?"#faf8f4":"transparent",borderLeft:isCurrent?"3px solid #8B4513":"3px solid transparent"}},
                  h("div",{style:{width:7,height:7,borderRadius:"50%",flexShrink:0,background:complete?"#8B4513":partial?"#d4a574":"#ddd4c6"}}),
                  h("div",{style:{fontSize:13,fontFamily:"'Newsreader',serif",color:complete?"#a09585":"#5a4a3c",fontWeight:isCurrent?700:400,textDecoration:complete?"line-through":"none",flex:1}},pair[0]+"  &  "+pair[1]),
                  isCurrent&&h("span",{style:{fontSize:9,background:"#8B4513",color:"#fff",padding:"2px 6px",borderRadius:4,fontWeight:700,fontFamily:"system-ui"}},"NEXT")
                ),
                isExp&&h("div",{style:{padding:"4px 0 8px 18px"}},h(PairCard,{pairIdx:idx,isCurrent,state,toggle}))
              )
            })
          )
        )
      })
    )
  }

  const tab=(key,label)=>h("button",{key,onClick:()=>setView(key),style:{flex:1,padding:"10px 0",border:"none",borderRadius:0,background:"transparent",cursor:"pointer",color:view===key?"#8B4513":"#a09585",fontSize:14,fontWeight:view===key?700:500,fontFamily:"'Newsreader',serif",borderBottom:view===key?"2px solid #8B4513":"2px solid transparent"}},label);

  return h("div",{style:{padding:0}},
    // Header
    h("div",{style:{padding:"24px 20px 0",textAlign:"center"}},
      h("div",{style:{fontSize:11,letterSpacing:"0.25em",textTransform:"uppercase",color:"#a09585",fontWeight:600,marginBottom:4}},"M\u2019Cheyne Plan"),
      h("div",{style:{fontFamily:"'Newsreader',serif",fontSize:28,fontWeight:700,color:"#3C2415",lineHeight:1.1}},"Bible Reading"),
      h("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginTop:6}},
        h("span",{style:{fontSize:13,color:"#a09585",fontFamily:"'Newsreader',serif"}},username.charAt(0).toUpperCase()+username.slice(1)),
        h("button",{onClick:function(){sessionStorage.removeItem("br_user");location.reload()},style:{fontSize:11,color:"#c0a888",background:"none",border:"none",cursor:"pointer",fontFamily:"'Newsreader',serif",textDecoration:"underline"}},"sign out")
      )
    ),
    // Progress
    h("div",{style:{padding:"16px 20px 0"}},
      h("div",{style:{background:"#ece4d8",borderRadius:100,height:6,overflow:"hidden"}},
        h("div",{style:{width:pct+"%",height:"100%",background:"linear-gradient(90deg, #d4a574, #8B4513)",borderRadius:100,transition:"width 0.5s ease"}})
      ),
      h("div",{style:{display:"flex",justifyContent:"space-between",marginTop:6,fontSize:11,color:"#a09585"}},
        h("span",null,totalChecked+" of "+TOTAL+" readings"),h("span",null,pct+"%")
      )
    ),
    // Tabs
    h("div",{style:{display:"flex",gap:0,padding:"16px 20px 0"}},tab("read","Read"),tab("browse","Browse"),tab("stats","Stats"),tab("memory","Memory")),
    // Content
    h("div",{style:{padding:"16px 20px 40px"}},
      view==="read"&&h("div",{style:{display:"flex",flexDirection:"column",gap:12}},
        pos>=2&&h("div",null,
          h("div",{style:{fontSize:12,color:"#a09585",marginBottom:6,fontFamily:"'Newsreader',serif",fontStyle:"italic"}},"Recently read · tap to undo"),
          h(PairCard,{pairIdx:pos-2,isCurrent:false,state,toggle}),
          h("div",{style:{height:6}}),
          h(PairCard,{pairIdx:pos-1,isCurrent:false,state,toggle})
        ),
        pos===1&&h("div",null,
          h("div",{style:{fontSize:12,color:"#a09585",marginBottom:6,fontFamily:"'Newsreader',serif",fontStyle:"italic"}},"Recently read · tap to undo"),
          h(PairCard,{pairIdx:pos-1,isCurrent:false,state,toggle})
        ),
        pos<PAIRS&&h(PairCard,{pairIdx:pos,label:"Up next",isCurrent:true,state,toggle}),
        pos+1<PAIRS&&h("div",null,
          h("div",{style:{fontSize:12,color:"#a09585",marginBottom:6,marginTop:8,fontFamily:"'Newsreader',serif",fontStyle:"italic"}},"Coming up"),
          h(PairCard,{pairIdx:pos+1,isCurrent:false,state,toggle}),
          pos+2<PAIRS&&h("div",{style:{height:6}}),
          pos+2<PAIRS&&h(PairCard,{pairIdx:pos+2,isCurrent:false,state,toggle})
        ),
        pos>=PAIRS&&h("div",{style:{textAlign:"center",padding:"40px 20px"}},
          h("div",{style:{fontSize:48,marginBottom:16}},"🎉"),
          h("div",{style:{fontFamily:"'Newsreader',serif",fontSize:24,fontWeight:700,color:"#3C2415",marginBottom:8}},"Plan Complete!"),
          h("div",{style:{fontSize:14,color:"#6b5744",fontFamily:"'Newsreader',serif"}},"You've read through the entire M'Cheyne plan."),
          h("button",{onClick:()=>{const s={...ds(),position:0};_saving.current=true;setState(s);save(s);setTimeout(()=>{_saving.current=false},1000)},style:{marginTop:20,padding:"12px 24px",borderRadius:10,border:"none",background:"#8B4513",color:"#fff",cursor:"pointer",fontSize:14,fontFamily:"'Newsreader',serif",fontWeight:600}},"Start Over")
        )
      ),
      view==="browse"&&h(BrowseView),
      view==="stats"&&h("div",{style:{display:"flex",flexDirection:"column",gap:16}},
        h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
          [[totalChecked,"readings done","📖"],[TOTAL-totalChecked,"remaining","📋"],[stats.currentStreak,"day streak","🔥"],[stats.longestStreak,"best streak","⭐"]].map(([val,label,icon],i)=>
            h("div",{key:i,style:{background:"#fff",borderRadius:14,padding:"18px 16px",border:"1px solid #e8e0d4",textAlign:"center"}},
              h("div",{style:{fontSize:20,marginBottom:4}},icon),
              h("div",{style:{fontSize:28,fontFamily:"'Newsreader',serif",fontWeight:700,color:"#3C2415"}},typeof val==="number"?val.toLocaleString():val),
              h("div",{style:{fontSize:12,color:"#a09585",fontFamily:"'Newsreader',serif"}},label)
            )
          )
        ),
        // Chart
        h("div",{style:{background:"#fff",borderRadius:14,padding:"18px 16px",border:"1px solid #e8e0d4"}},
          h("div",{style:{fontSize:14,fontFamily:"'Newsreader',serif",fontWeight:600,color:"#3C2415",marginBottom:12}},"Last 30 Days"),
          h("div",{style:{display:"flex",alignItems:"flex-end",gap:2,height:120,padding:"0 4px"}},
            chartData.map((d,i)=>h("div",{key:i,style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}},
              h("div",{style:{width:"100%",maxWidth:14,borderRadius:4,minHeight:3,height:d.readings>0?Math.min(d.readings/6*90,90)+"px":"3px",background:d.readings>=4?"#8B4513":d.readings>=2?"#a0673a":d.readings>0?"#d4a574":"#e0d6ca"}}),
              i%5===0&&h("div",{style:{fontSize:8,color:"#a09585",fontFamily:"system-ui",whiteSpace:"nowrap"}},d.label)
            ))
          ),
          h("div",{style:{display:"flex",justifyContent:"center",gap:16,marginTop:12}},
            [["#8B4513","4+"],["#a0673a","2–3"],["#d4a574","1"],["#e0d6ca","—"]].map(([c,l],i)=>
              h("div",{key:i,style:{display:"flex",alignItems:"center",gap:4}},h("div",{style:{width:10,height:10,borderRadius:2,background:c}}),h("span",{style:{fontSize:10,color:"#a09585"}},l))
            )
          )
        ),
        // Heatmap
        h("div",{style:{background:"#fff",borderRadius:14,padding:"18px 16px",border:"1px solid #e8e0d4"}},
          h("div",{style:{fontSize:14,fontFamily:"'Newsreader',serif",fontWeight:600,color:"#3C2415",marginBottom:12}},"12 Week Heatmap"),
          h("div",{style:{display:"flex",gap:3,justifyContent:"center",flexWrap:"wrap"}},
            Array.from({length:84},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(83-i));const s=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");const v=state.log[s]||0;return h("div",{key:i,title:s+": "+v,style:{width:12,height:12,borderRadius:3,background:v>=4?"#8B4513":v>=2?"#a0673a":v>0?"#d4a574":"#ece4d8"}})})
          ),
          h("div",{style:{textAlign:"center",marginTop:8,fontSize:10,color:"#a09585"}},"Each square = 1 day · Darker = more readings")
        ),
        // Jump
        h("div",{style:{background:"#fff",borderRadius:14,padding:"18px 16px",border:"1px solid #e8e0d4"}},
          h("div",{style:{fontSize:14,fontFamily:"'Newsreader',serif",fontWeight:600,color:"#3C2415",marginBottom:8}},"Adjust Position"),
          h("div",{style:{fontSize:12,color:"#6b5744",marginBottom:12,fontFamily:"'Newsreader',serif"}},"Currently at pair "+(pos+1)+(pos<PAIRS?": "+gp(pos).join(" + "):" — Complete!")),
          h("button",{onClick:()=>{const input=prompt("Jump to which pair? (1–"+PAIRS+")\nCurrently at "+(pos+1)+": "+(pos<PAIRS?gp(pos).join(" + "):"Done"));if(input){const n=parseInt(input);if(n>=1&&n<=PAIRS){_saving.current=true;const s={...state,position:n-1};setState(s);save(s);setTimeout(()=>{_saving.current=false},1000)}}},style:{width:"100%",padding:10,borderRadius:8,border:"1px solid #ddd4c6",background:"transparent",cursor:"pointer",color:"#8B4513",fontSize:13,fontFamily:"'Newsreader',serif"}},"Jump to Pair...")
        ),
        // Reset
        h("button",{onClick:()=>{if(confirm("Reset all reading data? This cannot be undone.")){_saving.current=true;const s=ds();setState(s);save(s);setTimeout(()=>{_saving.current=false},1000)}},style:{padding:12,borderRadius:10,border:"1px solid #e0d6ca",background:"transparent",cursor:"pointer",color:"#a09585",fontSize:13,fontFamily:"'Newsreader',serif"}},"Reset All Data")
      ),
      view==="memory"&&h(MemoryView)
    )
  )
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
} // end bootApp
if(typeof _savedUser!=="undefined"&&_savedUser)bootApp(_savedUser);
</script>
